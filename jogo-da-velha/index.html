<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Ultra | JS Games</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --p1-color: #22c55e; --p2-color: #ef4444; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        nav { width: 100%; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(30, 41, 59, 0.8); box-sizing: border-box; }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; cursor: pointer; }
        #game-setup { background: var(--card); padding: 20px; border-radius: 15px; margin: 20px 0; width: 90%; max-width: 400px; }
        select, input { width: 100%; padding: 10px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; box-sizing: border-box; }
        .btn-start { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        #status { font-size: 1.2rem; margin: 15px 0; font-weight: bold; height: 30px; }
        #board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 10px; background: #334155; padding: 10px; border-radius: 12px; }
        .cell { background: var(--card); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; cursor: pointer; }
        .cell.x { color: var(--p1-color); } .cell.o { color: var(--p2-color); }
        .win { background: #1e293b !important; transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <nav>
        <a href="../index.html" class="back-btn">← Voltar</a>
        <div id="player-id-display" style="font-size: 0.8rem; color: #94a3b8;">ID: #JS-99</div>
    </nav>
    <div id="game-setup">
        <h3>Configurar Partida</h3>
        <select id="mode-select" onchange="toggleBotOptions()">
            <option value="local">2 Jogadores (Mesma Tela)</option>
            <option value="bot">Contra Bot (IA)</option>
            <option value="online">Online (Via ID)</option>
        </select>
        <div id="bot-config" class="hidden">
            <select id="difficulty-select"><option value="0">Bot Noob</option><option value="5">Bot Impossível</option></select>
        </div>
        <div id="online-config" class="hidden"><input type="text" id="opponent-id" placeholder="ID da Sala"></div>
        <button class="btn-start" onclick="initGame()">INICIAR</button>
    </div>
    <div id="status">Aguardando...</div>
    <div id="board">
        <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
    </div>

    <script>
        let board = Array(9).fill(""); let currentPlayer = "X"; let isGameActive = false;
        let gameMode = "local"; let botLevel = 0;
        let socket, mySymbol, myTurn = false, currentRoom;

        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');

        function toggleBotOptions() {
            const m = document.getElementById('mode-select').value;
            document.getElementById('bot-config').className = m === 'bot' ? '' : 'hidden';
            document.getElementById('online-config').className = m === 'online' ? '' : 'hidden';
        }

        function initGame() {
            board = Array(9).fill(""); currentPlayer = "X"; isGameActive = true;
            gameMode = document.getElementById('mode-select').value;
            cells.forEach(c => { c.innerText = ""; c.classList.remove('x', 'o', 'win'); });
            
            if(gameMode === 'online') {
                statusText.innerText = "Conectando...";
                socket = io('https://glasses-tony-librarian-fields.trycloudflare.com');
                socket.emit('joinGame', { roomToJoin: document.getElementById('opponent-id').value || "global" });
                socket.on('gameStart', d => {
                    currentRoom = d.room; mySymbol = (d.players[0] === socket.id) ? 'X' : 'O';
                    myTurn = (mySymbol === 'X'); statusText.innerText = `Online! Você é ${mySymbol}`;
                });
                socket.on('moveMade', d => { handleMove(d.index); myTurn = true; });
            } else {
                statusText.innerText = "Vez do X";
            }
        }

        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                const idx = cell.dataset.index;
                if(board[idx] !== "" || !isGameActive || (gameMode === 'online' && !myTurn)) return;
                handleMove(idx);
                if(gameMode === 'online') { socket.emit('makeMove', { room: currentRoom, index: idx, symbol: mySymbol }); myTurn = false; }
                if(isGameActive && gameMode === "bot" && currentPlayer === "O") setTimeout(executeBotMove, 500);
            });
        });

        function handleMove(idx) {
            board[idx] = currentPlayer; cells[idx].innerText = currentPlayer;
            cells[idx].classList.add(currentPlayer.toLowerCase());
            if(checkWinner()) { statusText.innerText = `${currentPlayer} Venceu!`; isGameActive = false; return; }
            if(!board.includes("")) { statusText.innerText = "Empate!"; isGameActive = false; return; }
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusText.innerText = `Vez do ${currentPlayer}`;
        }

        function checkWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(p => {
                if(board[p[0]] && board[p[0]] === board[p[1]] && board[p[0]] === board[p[2]]) {
                    p.forEach(i => cells[i].classList.add('win')); return true;
                }
                return false;
            });
        }
        // ... (Função executeBotMove e Minimax permanecem as mesmas do seu original) ...
    </script>
</body>
</html>
