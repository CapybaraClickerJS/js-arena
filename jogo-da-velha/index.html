<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Ultra | JS Games</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --p1-color: #22c55e; --p2-color: #ef4444; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        nav { width: 100%; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(30, 41, 59, 0.8); box-sizing: border-box; }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; cursor: pointer; }
        #game-setup { background: var(--card); padding: 20px; border-radius: 15px; margin: 20px 0; width: 90%; max-width: 400px; }
        select, input { width: 100%; padding: 10px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; box-sizing: border-box; }
        .btn-start { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-start:active { transform: scale(0.95); }
        #status { font-size: 1.2rem; margin: 15px 0; font-weight: bold; height: 30px; text-align: center; }
        #board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 10px; background: #334155; padding: 10px; border-radius: 12px; }
        .cell { background: var(--card); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .cell.x { color: var(--p1-color); } .cell.o { color: var(--p2-color); }
        .win { background: #1e293b !important; transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <nav>
        <a href="../index.html" class="back-btn">← Voltar</a>
        <div id="player-id-display" style="font-size: 0.8rem; color: #94a3b8;">ID: #JS-99</div>
    </nav>
    <div id="game-setup">
        <h3>Configurar Partida</h3>
        <select id="mode-select" onchange="toggleBotOptions()">
            <option value="local">2 Jogadores (Mesma Tela)</option>
            <option value="bot">Contra Bot (IA)</option>
            <option value="online">Online (Via ID)</option>
        </select>
        <div id="bot-config" class="hidden">
            <select id="difficulty-select">
                <option value="0">Bot Iniciante (Cego)</option>
                <option value="1">Bot Noob</option>
                <option value="2">Bot Médio</option>
                <option value="3">Bot Raivoso</option>
                <option value="4">Bot Pensativo</option>
                <option value="5">Bot Impossível (Super Mega IA)</option>
            </select>
        </div>
        <div id="online-config" class="hidden">
            <input type="text" id="opponent-id" placeholder="ID da Sala">
            <small style="color: #ef4444; font-size: 0.8rem;">Aviso: Servidor offline no momento.</small>
        </div>
        <button class="btn-start" onclick="initGame()">INICIAR</button>
    </div>
    <div id="status">Aguardando...</div>
    <div id="board">
        <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
    </div>

    <script>
        let board = Array(9).fill(""); 
        let currentPlayer = "X"; 
        let isGameActive = false;
        let gameMode = "local"; 
        
        // Variáveis do modo online (Desativado temporariamente por falta de servidor)
        let socket, mySymbol, myTurn = false, currentRoom;

        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');

        function toggleBotOptions() {
            const m = document.getElementById('mode-select').value;
            document.getElementById('bot-config').className = m === 'bot' ? '' : 'hidden';
            document.getElementById('online-config').className = m === 'online' ? '' : 'hidden';
        }

        function initGame() {
            board = Array(9).fill(""); 
            currentPlayer = "X"; 
            isGameActive = true;
            gameMode = document.getElementById('mode-select').value;
            
            cells.forEach(c => { 
                c.innerText = ""; 
                c.classList.remove('x', 'o', 'win'); 
            });
            
            if(gameMode === 'online') {
                statusText.innerText = "Erro: Servidor de salas está offline!";
                isGameActive = false;
                // O código Socket.io ficaria aqui, mas o servidor Cloudflare que você usou não existe mais.
            } else {
                statusText.innerText = "Vez do X (Humano)";
            }
        }

        // --- SISTEMA DE CLIQUES (ONDE A MÁGICA ACONTECE) ---
        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                const idx = cell.dataset.index;
                
                // 1. Se o jogo acabou, ou a célula tá cheia, ignora
                if(board[idx] !== "" || !isGameActive) return;
                
                // 2. Se for modo BOT e for a vez do BOT (O), o humano NÃO PODE CLICAR!
                if(gameMode === "bot" && currentPlayer === "O") return;

                // 3. O humano joga
                handleMove(idx);

                // 4. Se for contra o bot e o jogo ainda não acabou, manda o bot jogar
                if(isGameActive && gameMode === "bot" && currentPlayer === "O") {
                    statusText.innerText = "Bot está pensando...";
                    
                    // O "Bot Pensativo" demora mais pra jogar
                    let level = parseInt(document.getElementById('difficulty-select').value);
                    let tempoDeEspera = (level === 4) ? 1200 : 500;
                    
                    setTimeout(executeBotMove, tempoDeEspera);
                }
            });
        });

        function handleMove(idx) {
            board[idx] = currentPlayer; 
            cells[idx].innerText = currentPlayer;
            cells[idx].classList.add(currentPlayer.toLowerCase());
            
            if(checkWinner()) { 
                statusText.innerText = `O jogador ${currentPlayer} AMASSOU!`; 
                isGameActive = false; 
                return; 
            }
            if(!board.includes("")) { 
                statusText.innerText = "Deu Velha! Empate!"; 
                isGameActive = false; 
                return; 
            }
            
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            
            if (gameMode === "local") {
                statusText.innerText = `Vez do ${currentPlayer}`;
            } else if (gameMode === "bot" && currentPlayer === "X") {
                statusText.innerText = "Sua Vez (X)";
            }
        }

        function checkWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(p => {
                if(board[p[0]] && board[p[0]] === board[p[1]] && board[p[0]] === board[p[2]]) {
                    p.forEach(i => cells[i].classList.add('win')); 
                    return true;
                }
                return false;
            });
        }

        // --- INTELIGÊNCIA ARTIFICIAL DOS BOTS (O CÉREBRO) ---
        function executeBotMove() {
            if (!isGameActive) return;
            
            let level = parseInt(document.getElementById('difficulty-select').value);
            let available = board.map((val, idx) => val === "" ? idx : null).filter(v => v !== null);
            
            if (available.length === 0) return;

            // Chance do bot fazer a jogada PERFEITA (Minimax)
            let chanceDeAcerto = 0;
            if (level === 0) chanceDeAcerto = 0;       // Iniciante: 0% inteligência, 100% aleatório
            else if (level === 1) chanceDeAcerto = 0.2; // Noob: 20% inteligente
            else if (level === 2) chanceDeAcerto = 0.5; // Médio: 50% inteligente
            else if (level === 3) chanceDeAcerto = 0.7; // Raivoso: 70% inteligente
            else if (level === 4) chanceDeAcerto = 0.9; // Pensativo: 90% inteligente (e demora mais)
            else if (level === 5) chanceDeAcerto = 1.0; // Impossível: 100% inteligência

            let chosenIndex;

            // Rola o "dado" pra ver se ele vai jogar bem ou jogar aleatório
            if (Math.random() < chanceDeAcerto) {
                chosenIndex = getBestMove(); // JOGADA INTELIGENTE
            } else {
                chosenIndex = available[Math.floor(Math.random() * available.length)]; // JOGADA ALEATÓRIA BURRA
            }
            
            handleMove(chosenIndex);
        }
        
        // Motor de Xadrez versão Jogo da Velha (Sabe todas as jogadas possíveis)
        function getBestMove() {
            let bestScore = -Infinity;
            let move;
            for (let i = 0; i < 9; i++) {
                if (board[i] === "") {
                    board[i] = "O";
                    let score = minimax(board, 0, false);
                    board[i] = "";
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        // Algoritmo que prevê o futuro do tabuleiro
        function minimax(newBoard, depth, isMaximizing) {
            let result = checkWinnerForMinimax();
            if (result === "O") return 10 - depth;
            if (result === "X") return depth - 10;
            if (result === "tie") return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (newBoard[i] === "") {
                        newBoard[i] = "O";
                        let score = minimax(newBoard, depth + 1, false);
                        newBoard[i] = "";
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (newBoard[i] === "") {
                        newBoard[i] = "X";
                        let score = minimax(newBoard, depth + 1, true);
                        newBoard[i] = "";
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function checkWinnerForMinimax() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let i = 0; i < wins.length; i++) {
                const [a, b, c] = wins[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a];
                }
            }
            if (!board.includes("")) return "tie";
            return null;
        }
    </script>
</body>
</html>
