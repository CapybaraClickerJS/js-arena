<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dino Run</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background:#0d0d1a;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100dvh;
    overflow:hidden;
    font-family:'Press Start 2P', monospace;
    touch-action:none;
    user-select:none;
  }

  #wrapper {
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    max-width:700px;
    padding:0 8px;
    gap:8px;
  }

  #header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:100%;
  }

  #title {
    color:#e2e240;
    font-size:clamp(9px,3.5vw,15px);
    letter-spacing:3px;
    text-shadow: 2px 2px 0 #6a6a00, 0 0 14px #e2e24066;
  }

  #scores {
    text-align:right;
    color:#e2e240;
    font-size:clamp(8px,3vw,12px);
    line-height:1.8;
  }
  #hiLabel { color:#555; font-size:0.8em; }

  #gameBox {
    position:relative;
    width:100%;
    border:2px solid #e2e24044;
    border-radius:6px;
    overflow:hidden;
    background:#0d0d1a;
    box-shadow:0 0 24px #e2e24022;
  }

  canvas {
    display:block;
    width:100%;
    height:auto;
    image-rendering:pixelated;
    cursor:pointer;
  }

  #touchZone {
    display:flex;
    width:100%;
    height:clamp(60px,16vw,88px);
    gap:8px;
  }

  .btn {
    flex:1;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Press Start 2P', monospace;
    font-size:clamp(10px,4vw,18px);
    cursor:pointer;
    border:2px solid;
    transition:transform 0.08s, opacity 0.08s;
  }
  .btn:active { transform:scale(0.93); opacity:0.75; }

  #btnJump {
    flex:2;
    background:#0d2e14;
    border-color:#4ade80;
    color:#4ade80;
    box-shadow:0 0 14px #4ade8033;
  }
  #btnDuck {
    background:#14102e;
    border-color:#a78bfa;
    color:#a78bfa;
    box-shadow:0 0 14px #a78bfa33;
  }

  #hint {
    color:#2a2a44;
    font-size:clamp(5px,1.5vw,7px);
    letter-spacing:1px;
  }
</style>
</head>
<body>
<div id="wrapper">
  <div id="header">
    <div id="title">🦕 DINO RUN</div>
    <div id="scores">
      <div id="hiLabel">HI <span id="hiScore">00000</span></div>
      <div id="score">00000</div>
    </div>
  </div>

  <div id="gameBox">
    <canvas id="game"></canvas>
  </div>

  <div id="touchZone">
    <div class="btn" id="btnJump">▲ PULAR</div>
    <div class="btn" id="btnDuck">▼ AGACHAR</div>
  </div>
  <div id="hint">TECLADO: ESPAÇO/↑ pula &nbsp;·&nbsp; ↓ agacha</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Virtual canvas size (internal resolution)
const VW = 700, VH = 200;
canvas.width = VW;
canvas.height = VH;

const GY = VH - 36; // ground y

const C = {
  bg:'#0d0d1a', gr:'#e2e240',
  dino:'#4ade80', dk:'#16a34a',
  cact:'#ef4444', cactD:'#991b1b',
  pt:'#a78bfa', ptD:'#5b21b6',
};

let state='idle', score=0, hiScore=0, speed=0;
let frame=0, lastTime=null, flashT=0;
let obstacles=[], particles=[], clouds=[];
let spawnTimer=0, spawnNext=0;

// ── Pixel rect helper ──────────────────────────────────────────────
function p(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(~~x,~~y,w,h); }

// ── Dino object ───────────────────────────────────────────────────
const D = {
  x:55, y:GY, vy:0, ay:2000,
  jumps:0, maxJ:2, duck:false,
  lf:0, lt:0,
  W:34, H:42, DW:50, DH:18,

  top()    { return this.y-(this.duck?this.DH:this.H); },
  bot()    { return this.y; },
  left()   { return this.x+4; },
  right()  { return this.x+(this.duck?this.DW:this.W)-4; },
  ground() { return this.y>=GY; },

  jump() {
    if(this.jumps<this.maxJ && !this.duck){
      this.vy=-640; this.jumps++;
      burst(this.x+this.W/2, this.y, 7, [C.dino,C.gr]);
    }
  },
  setDuck(on){
    if(on && this.ground()) this.duck=true;
    else if(!on) this.duck=false;
  },

  update(dt){
    if(this.duck && !this.ground()) this.duck=false;
    this.vy+=this.ay*dt; this.y+=this.vy*dt;
    if(this.y>=GY){ this.y=GY; this.vy=0; this.jumps=0; }
    if(this.ground()&&!this.duck){ this.lt+=dt; if(this.lt>0.13){this.lf^=1;this.lt=0;} }
  },

  draw(){
    const x=this.x, y=this.y, d=C.dino, dk=C.dk;
    if(this.duck){
      p(x+4,  y-18, 46,13, d);
      p(x+8,  y-24, 36, 8, d);
      p(x+40, y-24, 14,10, d);
      p(x+34, y-20, 20, 7, d);
      p(x+52, y-22, 5,  2, dk);
      p(x+46, y-22, 4,  4, '#fff'); p(x+47,y-21,2,2,'#111');
      p(x+2,  y-14, 5,  4, d);
      p(x+14, y-5,  6,  5, d); p(x+26,y-4,6,4,dk);
    } else {
      const lf=this.lf;
      p(x+5,  y-38, 22,15, d);
      p(x+3,  y-32, 26,12, d);
      p(x+3,  y-22, 24, 9, d);
      p(x+5,  y-14, 18, 6, d);
      p(x+20, y-42, 10, 8, d);
      p(x+16, y-42, 18,13, d);
      p(x+14, y-38, 22, 7, d);
      p(x+28, y-38, 5,  5, '#fff'); p(x+29,y-37,3,3,'#111');
      p(x+30, y-28, 4,  2, dk);
      p(x+10, y-20, 6,  5, dk);
      p(x+2,  y-16, 5,  4, d); p(x+0,y-12,4,4,d);
      if(lf===0){
        p(x+10,y-7, 6,7,d); p(x+8, y,  8,0,d);
        p(x+20,y-4, 6,4,dk);
      } else {
        p(x+10,y-4, 6,4,dk);
        p(x+20,y-7, 6,7,d); p(x+18,y,  8,0,d);
      }
    }
  }
};

// ── Cactus draw ───────────────────────────────────────────────────
function drawCactus(x, t){
  const c=C.cact, cd=C.cactD;
  if(t===0){
    p(x+6, GY-38,8,38,c); p(x,GY-24,6,6,c); p(x,GY-20,20,4,c);
    p(x+14,GY-28,6,6,c); p(x+8,GY-38,2,38,cd);
  } else if(t===1){
    p(x+4, GY-50,8,50,c); p(x+18,GY-40,8,40,c);
    p(x,   GY-32,4,6,c);  p(x,   GY-28,18,4,c);
    p(x+12,GY-36,6,6,c);  p(x+12,GY-32,16,4,c);
    p(x+6, GY-50,2,50,cd); p(x+20,GY-40,2,40,cd);
  } else {
    p(x+7, GY-44,8,44,c); p(x+21,GY-32,8,32,c); p(x+35,GY-40,8,40,c);
    p(x,   GY-26,7,5,c);  p(x,   GY-22,22,4,c);
    p(x+29,GY-22,6,5,c);  p(x+29,GY-18,18,4,c);
    p(x+9, GY-44,2,44,cd); p(x+23,GY-32,2,32,cd); p(x+37,GY-40,2,40,cd);
  }
}

// ── Ptero draw ────────────────────────────────────────────────────
function drawPtero(x, y, wu){
  const c=C.pt, cd=C.ptD;
  p(x+14,y-13,18,11,c); p(x+10,y-11,24,8,c);
  p(x+30,y-17,13, 9,c); p(x+41,y-13,5, 2,cd);
  p(x+36,y-15,4,  4,'#fff'); p(x+37,y-14,2,2,'#111');
  p(x+8, y-9, 4,  4,c); p(x+6,y-5,4,3,c);
  if(wu){
    p(x,   y-30,13,4,c); p(x+2, y-25,11,6,c);
    p(x+32,y-22,12,4,c); p(x+34,y-17,10,6,c);
  } else {
    p(x+2, y-7, 12,4,c); p(x,   y-3, 14,5,c);
    p(x+30,y-7, 12,4,c); p(x+28,y-3, 14,5,c);
  }
}

// ── Particles ─────────────────────────────────────────────────────
function burst(x,y,n,cols){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, spd=Math.random()*130+40;
    particles.push({
      x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-60,
      life:1, decay:Math.random()*1.8+0.8,
      sz:Math.random()*3.5+1.5,
      c:cols[~~(Math.random()*cols.length)]
    });
  }
}
function tickPart(dt){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=700*dt; p.life-=p.decay*dt; });
}
function drawPart(){
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.c;
    ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  });
  ctx.globalAlpha=1;
}

// ── Clouds ────────────────────────────────────────────────────────
function initClouds(){
  clouds=Array.from({length:4},(_,i)=>({
    x:i*190+60, y:Math.random()*40+10,
    w:Math.random()*70+50, h:Math.random()*12+8
  }));
}
function tickClouds(dt){
  clouds.forEach(c=>{
    c.x-=speed*0.12*dt;
    if(c.x+c.w<0){ c.x=VW+30; c.y=Math.random()*40+10; c.w=Math.random()*70+50; }
  });
}
function drawClouds(){
  ctx.fillStyle='rgba(255,255,255,0.04)';
  clouds.forEach(c=>{
    ctx.beginPath();
    ctx.ellipse(c.x+c.w/2,c.y,c.w/2,c.h/2,0,0,Math.PI*2);
    ctx.fill();
  });
}

// ── Ground ────────────────────────────────────────────────────────
function drawGround(){
  p(0, GY+2, VW, 2, C.gr);
  ctx.fillStyle='rgba(226,226,64,0.18)';
  for(let i=0;i<VW;i+=15){
    const ox=(i+frame*2)%VW;
    ctx.fillRect(ox, GY+5, 5, 2);
    ctx.fillRect((ox+38)%VW, GY+8, 3, 2);
  }
}

// ── Obstacle spawning ─────────────────────────────────────────────
function spawn(){
  if(Math.random()<0.65||score<200){
    const t=~~(Math.random()*3), ws=[20,34,50];
    obstacles.push({type:'c',t,x:VW+10,w:ws[t]});
  } else {
    const ys=[GY-42,GY-66,GY-90];
    const y=ys[~~(Math.random()*ys.length)];
    obstacles.push({type:'p',x:VW+10,y,w:46,wt:0,wu:true});
  }
}

// ── Collision ─────────────────────────────────────────────────────
function hit(){
  for(const o of obstacles){
    let ox,oy,ow,oh;
    if(o.type==='c'){
      const ws=[20,34,50],hs=[40,52,46];
      ox=o.x+4; ow=ws[o.t]-8; oy=GY-hs[o.t]; oh=hs[o.t];
    } else {
      ox=o.x+5; ow=o.w-8; oy=o.y-14; oh=14;
    }
    if(D.right()>ox&&D.left()<ox+ow&&D.bot()>oy&&D.top()<oy+oh) return true;
  }
  return false;
}

// ── Score HUD ─────────────────────────────────────────────────────
function updScore(){
  document.getElementById('score').textContent=String(~~score).padStart(5,'0');
  document.getElementById('hiScore').textContent=String(~~hiScore).padStart(5,'0');
}

// ── Overlay ───────────────────────────────────────────────────────
function overlay(title, sub){
  ctx.fillStyle='rgba(13,13,26,0.6)';
  ctx.fillRect(0,0,VW,VH);
  ctx.textAlign='center';
  ctx.shadowColor=C.gr; ctx.shadowBlur=18;
  ctx.fillStyle=C.gr;
  ctx.font='bold 17px "Press Start 2P"';
  ctx.fillText(title, VW/2, VH/2-8);
  ctx.shadowBlur=0;
  ctx.fillStyle='#555';
  ctx.font='7px "Press Start 2P"';
  ctx.fillText(sub, VW/2, VH/2+14);
  ctx.textAlign='left';
}

// ── Init / Reset ──────────────────────────────────────────────────
function init(){
  state='idle'; score=0; speed=230; frame=0; flashT=0;
  obstacles=[]; particles=[];
  D.y=GY; D.vy=0; D.jumps=0; D.duck=false; D.lf=0; D.lt=0;
  initClouds(); updScore();
}

// ── Main loop ─────────────────────────────────────────────────────
function loop(ts){
  requestAnimationFrame(loop);
  if(!lastTime){lastTime=ts;return;}
  let dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts; frame++;

  ctx.fillStyle=C.bg; ctx.fillRect(0,0,VW,VH);
  drawClouds(); drawGround();

  if(state==='idle'){
    D.lt+=dt; if(D.lt>0.15){D.lf^=1;D.lt=0;}
    D.draw();
    overlay('DINO RUN','TOQUE OU ESPAÇO PARA JOGAR');
    return;
  }

  if(state==='playing'){
    speed=230+score*0.22;
    score+=dt*10; if(score>hiScore)hiScore=score;
    updScore();
    tickClouds(dt); D.update(dt);

    spawnTimer+=dt*1000;
    if(spawnTimer>=spawnNext){
      spawn(); spawnTimer=0;
      spawnNext=Math.max(700,1500-score*0.35)+Math.random()*450;
    }

    obstacles.forEach(o=>{
      o.x-=speed*dt;
      if(o.type==='p'){o.wt+=dt; if(o.wt>0.22){o.wu=!o.wu;o.wt=0;}}
    });
    obstacles=obstacles.filter(o=>o.x+o.w+10>0);
    tickPart(dt);

    if(hit()){
      state='dead';
      burst(D.x+17,D.y-21,18,[C.dino,C.gr,'#fff']);
      if(score>hiScore)hiScore=score; updScore();
    }
  }

  if(state==='dead'){flashT+=dt; tickPart(dt);}

  obstacles.forEach(o=>{
    if(o.type==='c') drawCactus(o.x,o.t);
    else drawPtero(o.x,o.y,o.wu);
  });
  drawPart();

  if(state!=='dead'||~~(flashT*10)%2===0) D.draw();
  if(state==='dead') overlay('GAME OVER','TOQUE OU ESPAÇO PARA REINICIAR');
}

// ── Action handler ────────────────────────────────────────────────
function action(){
  if(state==='idle'){state='playing';spawnNext=1200;spawnTimer=0;}
  else if(state==='playing') D.jump();
  else if(state==='dead'){init();state='playing';spawnNext=1200;spawnTimer=0;}
}

// Botões touch
const btnJ=document.getElementById('btnJump');
const btnD=document.getElementById('btnDuck');

btnJ.addEventListener('touchstart',e=>{e.preventDefault();action();},{passive:false});
btnJ.addEventListener('mousedown', e=>{e.preventDefault();action();});

btnD.addEventListener('touchstart',e=>{e.preventDefault();D.setDuck(true);},{passive:false});
btnD.addEventListener('touchend',  e=>{e.preventDefault();D.setDuck(false);},{passive:false});
btnD.addEventListener('mousedown', e=>{e.preventDefault();D.setDuck(true);});
btnD.addEventListener('mouseup',   e=>{e.preventDefault();D.setDuck(false);});

// Canvas touch/click
canvas.addEventListener('touchstart',e=>{e.preventDefault();action();},{passive:false});
canvas.addEventListener('mousedown', e=>{e.preventDefault();action();});

// Teclado
document.addEventListener('keydown',e=>{
  if(['Space','ArrowUp'].includes(e.code)){e.preventDefault();action();}
  if(e.code==='ArrowDown'){e.preventDefault();D.setDuck(true);}
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowDown') D.setDuck(false);
});

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
