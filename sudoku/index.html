<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sudoku Master | JS Arena</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #1e40af; /* Azul do card que escolhemos */
            --accent-light: #3b82f6;
            --text: #f8fafc;
            --grid-line: #334155;
            --correct: #10b981;
            --wrong: #ef4444;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            padding: 20px; box-sizing: border-box;
        }

        nav {
            width: 100%; max-width: 500px; display: flex; 
            justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .back-btn {
            background: #334155; color: white; text-decoration: none;
            padding: 8px 16px; border-radius: 8px; font-weight: bold;
            font-size: 0.9rem;
        }

        h1 { margin: 0; font-size: 1.5rem; color: var(--accent-light); }

        .game-container {
            background: var(--card); padding: 15px;
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%; max-width: 400px;
        }

        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 0;
            border: 2px solid var(--accent-light);
            background: var(--grid-line);
            border-radius: 4px;
            overflow: hidden;
        }

        .cell {
            width: 100%; aspect-ratio: 1 / 1;
            background: var(--bg); color: var(--text);
            border: 1px solid #1e293b;
            text-align: center; font-size: 1.2rem; font-weight: bold;
            outline: none; transition: background 0.2s;
            /* Remove as setinhas de número no input */
            -moz-appearance: textfield; 
        }
        .cell::-webkit-outer-spin-button, .cell::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }

        .cell:focus { background: #1e3a8a; }
        
        .cell.fixed { background: #1e293b; color: #94a3b8; pointer-events: none; }
        .cell.correct { color: var(--correct); }
        .cell.wrong { background: rgba(239, 68, 68, 0.2); color: var(--wrong); }

        /* Bordas mais grossas para separar as grades 3x3 */
        .cell.border-right { border-right: 2px solid var(--accent-light); }
        .cell.border-bottom { border-bottom: 2px solid var(--accent-light); }

        .controls {
            margin-top: 20px; display: flex; gap: 10px;
        }

        button {
            flex: 1; background: var(--accent-light); color: white;
            border: none; padding: 12px; border-radius: 8px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; font-size: 0.9rem;
        }
        button.btn-clear { background: #ef4444; }

    </style>
</head>
<body>

    <nav>
        <a href="../index.html" class="back-btn">← Voltar</a>
        <h1>Sudoku</h1>
        <div style="width: 70px;"></div> </nav>

    <div class="game-container">
        <div class="sudoku-board" id="board"></div>
        
        <div class="controls">
            <button onclick="checkWin()">Verificar</button>
            <button class="btn-clear" onclick="resetBoard()">Reiniciar</button>
        </div>
    </div>

    <script>
        // Tabuleiro Solucionado Fixo (Para garantir que sempre tem solução)
        const solvedBoard = [
            5, 3, 4, 6, 7, 8, 9, 1, 2,
            6, 7, 2, 1, 9, 5, 3, 4, 8,
            1, 9, 8, 3, 4, 2, 5, 6, 7,
            8, 5, 9, 7, 6, 1, 4, 2, 3,
            4, 2, 6, 8, 5, 3, 7, 9, 1,
            7, 1, 3, 9, 2, 4, 8, 5, 6,
            9, 6, 1, 5, 3, 7, 2, 8, 4,
            2, 8, 7, 4, 1, 9, 6, 3, 5,
            3, 4, 5, 2, 8, 6, 1, 7, 9
        ];

        let puzzleBoard = [];
        const boardEl = document.getElementById('board');

        function generateBoard() {
            boardEl.innerHTML = '';
            puzzleBoard = [...solvedBoard];
            
            // Remove alguns números para criar o puzzle (Ex: 40 números removidos)
            let blanks = 40;
            while(blanks > 0) {
                let idx = Math.floor(Math.random() * 81);
                if(puzzleBoard[idx] !== '') {
                    puzzleBoard[idx] = '';
                    blanks--;
                }
            }

            // Cria os inputs
            for (let i = 0; i < 81; i++) {
                const input = document.createElement('input');
                input.type = 'number';
                input.className = 'cell';
                input.maxLength = 1;
                input.dataset.index = i;

                // Estiliza as grades 3x3
                if ((i + 1) % 3 === 0 && (i + 1) % 9 !== 0) input.classList.add('border-right');
                if (i >= 18 && i <= 26 || i >= 45 && i <= 53) input.classList.add('border-bottom');

                if (puzzleBoard[i] !== '') {
                    input.value = puzzleBoard[i];
                    input.classList.add('fixed');
                }

                // Validação de entrada
                input.addEventListener('input', (e) => {
                    if (e.target.value.length > 1) e.target.value = e.target.value.slice(0, 1);
                    if (e.target.value === '0') e.target.value = '';
                    e.target.classList.remove('wrong', 'correct');
                });

                boardEl.appendChild(input);
            }
        }

        function checkWin() {
            const cells = document.querySelectorAll('.cell');
            let isWin = true;

            cells.forEach((cell, i) => {
                if (!cell.classList.contains('fixed')) {
                    const val = parseInt(cell.value);
                    if (val === solvedBoard[i]) {
                        cell.classList.add('correct');
                        cell.classList.remove('wrong');
                    } else if (cell.value !== '') {
                        cell.classList.add('wrong');
                        cell.classList.remove('correct');
                        isWin = false;
                    } else {
                        isWin = false; // Tem células vazias
                    }
                }
            });

            if (isWin) {
                setTimeout(() => alert('Parabéns, JS! Você resolveu o Sudoku!'), 100);
            }
        }

        function resetBoard() {
            generateBoard();
        }

        // Inicia o jogo
        generateBoard();
    </script>
</body>
</html>
